<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Snippets Docs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f59e0b'/><text x='16' y='23' text-anchor='middle' font-family='monospace' font-size='16' font-weight='bold' fill='%230a0e17'>{S}</text></svg>">
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .logo { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 500; color: var(--accent); margin-bottom: 2rem; }
    .code { font-family: var(--font-display); font-size: clamp(6rem, 15vw, 10rem); font-weight: 700; color: var(--accent); line-height: 1; }
    .subtitle { font-family: var(--font-display); font-size: clamp(1.25rem, 3vw, 1.75rem); margin: 0.5rem 0 1rem; color: #fff; }
    .message { color: #94a3b8; max-width: 28rem; line-height: 1.6; margin-bottom: 2.5rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    .btn {
      display: inline-block; padding: 0.75rem 2rem; font-family: var(--font-body); font-weight: 600;
      font-size: 0.95rem; text-decoration: none; border-radius: var(--radius-md); transition: background var(--transition), color var(--transition);
    }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: #d97706; }
    .btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .btn-secondary:hover { background: var(--accent); color: var(--bg); }
    .footer { margin-top: auto; padding-top: 3rem; color: var(--text-faint); font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="logo">{S}</div>
  <div class="code">404</div>
  <p class="subtitle">Page not found</p>
  <p class="message">The page you're looking for doesn't exist or has been moved.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">Back to Docs</a>
    <a href="https://snippets.eu" class="btn btn-secondary">Visit snippets.eu</a>
  </div>
  <div class="footer">Snippets</div>
</body>
</html>
